substitutions:
  _SERVICE_NAME: a2a-travel-planner
  _REGION: us-central1

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA

images:
  - gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA
